name: .NET Tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "**" ]

jobs:
  patcher-tests:
    name: Run Cosmos.Tests.Patcher
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ ubuntu-latest ]
        dotnet-version: [ 10.0.x ]
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🛠️ Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ matrix.dotnet-version }}

      - name: 🔄 Restore Dependencies
        run: dotnet restore ./tests/Cosmos.Tests.Patcher/Cosmos.Tests.Patcher.csproj

      - name: 🔨 Build Cosmos.Patcher
        run: dotnet build ./src/Cosmos.Patcher/Cosmos.Patcher.csproj

      - name: 🔨 Build Cosmos.Build.Patcher
        run: dotnet build ./src/Cosmos.Build.Patcher/Cosmos.Build.Patcher.csproj

      - name: 🔨 Build Cosmos.Tests.Patcher
        run: dotnet build ./tests/Cosmos.Tests.Patcher/Cosmos.Tests.Patcher.csproj --configuration Debug --no-restore

      - name: 🚀 Run Tests
        run: dotnet test ./tests/Cosmos.Tests.Patcher/Cosmos.Tests.Patcher.csproj --no-build --configuration Debug --logger "trx;LogFileName=Cosmos.Tests.Patcher.trx"

      - name: 📤 Upload Test Results
        uses: actions/upload-artifact@v4
        with:
          name: Cosmos.Tests.Patcher-Results
          path: ./tests/Cosmos.Tests.Patcher/TestResults/Cosmos.Tests.Patcher.trx

  scanner-tests:
    name: Run Cosmos.Tests.Scanner
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ ubuntu-latest ]
        dotnet-version: [ 10.0.x ]
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🛠️ Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ matrix.dotnet-version }}

      - name: 🔄 Restore Dependencies
        run: dotnet restore ./tests/Cosmos.Tests.Scanner/Cosmos.Tests.Scanner.csproj

      - name: 🔨 Build Cosmos.Patcher
        run: dotnet build ./src/Cosmos.Patcher/Cosmos.Patcher.csproj

      - name: 🔨 Build Cosmos.Build.Patcher
        run: dotnet build ./src/Cosmos.Build.Patcher/Cosmos.Build.Patcher.csproj

      - name: 🔨 Build Cosmos.Tests.Scanner
        run: dotnet build ./tests/Cosmos.Tests.Scanner/Cosmos.Tests.Scanner.csproj --configuration Debug --no-restore

      - name: 🚀 Run Tests
        run: dotnet test ./tests/Cosmos.Tests.Scanner/Cosmos.Tests.Scanner.csproj --no-build --configuration Debug --logger "trx;LogFileName=Cosmos.Tests.Scanner.trx"

      - name: 📤 Upload Test Results
        uses: actions/upload-artifact@v4
        with:
          name: Cosmos.Tests.Scanner-Results
          path: ./tests/Cosmos.Tests.Scanner/TestResults/Cosmos.Tests.Scanner.trx

  analyzer-tests:
    name: Run Cosmos.Tests.Build.Analyzer.Patcher
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ ubuntu-latest ]
        dotnet-version: [ 10.0.x ]
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🛠️ Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ matrix.dotnet-version }}

      - name: 🔄 Restore Dependencies
        run: dotnet restore ./tests/Cosmos.Tests.Build.Analyzer.Patcher/Cosmos.Tests.Build.Analyzer.Patcher.csproj

      - name: 🔨 Build Cosmos.Patcher.Analyzer.Tests
        run: dotnet build ./tests/Cosmos.Tests.Build.Analyzer.Patcher/Cosmos.Tests.Build.Analyzer.Patcher.csproj --configuration Debug --no-restore

      - name: 🚀 Run Tests
        run: dotnet test ./tests/Cosmos.Tests.Build.Analyzer.Patcher/Cosmos.Tests.Build.Analyzer.Patcher.csproj --no-build --configuration Debug --logger "trx;LogFileName=Cosmos.Tests.Build.Analyzer.Patcher.trx"

      - name: 📤 Upload Test Results
        uses: actions/upload-artifact@v4
        with:
          name: Cosmos.Tests.Build.Analyzer.Patcher-Results
          path: ./tests/Cosmos.Tests.Build.Analyzer.Patcher/TestResults/Cosmos.Tests.Build.Analyzer.Patcher.trx

  asm-tests:
    name: Run Cosmos.Build.Asm.Test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ ubuntu-latest ]
        dotnet-version: [ 10.0.x ]
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🛠️ Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ matrix.dotnet-version }}

      - name: 🔗 Install Linking Tools
        run: sudo apt-get update && sudo apt-get install -y yasm

      - name: 🔄 Restore Dependencies
        run: dotnet restore ./tests/Cosmos.Tests.Build.Asm/Cosmos.Tests.Build.Asm.csproj

      - name: 🔨 Build Cosmos.Patcher
        run: dotnet build ./src/Cosmos.Patcher/Cosmos.Patcher.csproj

      - name: 🔨 Build Cosmos.Build.Patcher
        run: dotnet build ./src/Cosmos.Build.Patcher/Cosmos.Build.Patcher.csproj

      - name: 🔨 Build Cosmos.Build.Asm.Test
        run: dotnet build ./tests/Cosmos.Tests.Build.Asm/Cosmos.Tests.Build.Asm.csproj --configuration Debug --no-restore

      - name: 🚀 Run Tests
        run: dotnet test ./tests/Cosmos.Tests.Build.Asm/Cosmos.Tests.Build.Asm.csproj --no-build --configuration Debug --logger "trx;LogFileName=Cosmos.Tests.Build.Asm.trx"

      - name: 📤 Upload Test Results
        uses: actions/upload-artifact@v4
        with:
          name: Cosmos.Build.Asm.Test-Results
          path: ./tests/Cosmos.Tests.Build.Asm/TestResults/Cosmos.Tests.Build.Asm.trx

  unix-iso-tests:
    name: Run ISO Build Tests - Unix (${{ matrix.arch }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ ubuntu-latest ]
        dotnet-version: [ 10.0.x ]
        arch: [ x64, arm64 ]
        include:
          - arch: x64
            rid: linux-x64
            assembler: yasm
          - arch: arm64
            rid: linux-arm64
            assembler: gcc-aarch64-linux-gnu
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: 🛠️ Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ matrix.dotnet-version }}

      - name: 🧹 Clear NuGet cache before building packages
        run: dotnet nuget locals all --clear

      - name: 🔄 Compile Packages (multi-arch)
        run: ./.devcontainer/postCreateCommand.sh

      - name: 🔗 Install Common Linking Tools
        run: sudo apt-get update && sudo apt-get install -y xorriso lld

      - name: 🔗 Install x64 Assembler
        if: matrix.arch == 'x64'
        run: sudo apt-get install -y yasm

      - name: 🔗 Install ARM64 Cross-Compilation Tools
        if: matrix.arch == 'arm64'
        run: sudo apt-get install -y gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu


      - name: 🔧 Install Patcher
        run: dotnet tool install -g Cosmos.Patcher --add-source ./artifacts/package/release

      - name: Build ISO for ${{ matrix.arch }}
        run: |
          if [ "${{ matrix.arch }}" = "arm64" ]; then
            ARCH_DEFINE="ARCH_ARM64"
          else
            ARCH_DEFINE="ARCH_X64"
          fi
          dotnet publish -c Debug -r ${{ matrix.rid }} -p:DefineConstants="$ARCH_DEFINE" -p:CosmosArch=${{ matrix.arch }} --verbosity detailed ./examples/DevKernel/DevKernel.csproj -o ./output-${{ matrix.arch }}

      - name: 🕵️‍♂️ Verify Output
        run: |
          [ -f ./output-${{ matrix.arch }}/DevKernel.iso ] && echo "ISO exists for ${{ matrix.arch }}" || (echo "ISO missing for ${{ matrix.arch }}" && exit 1)

      - name: 📤 Upload ISO
        uses: actions/upload-artifact@v4
        with:
          name: DevKernel-ISO-${{ matrix.arch }}-${{ github.job }}-${{ matrix.arch }}-${{ github.run_number }}
          path: ./output-${{ matrix.arch }}/DevKernel.iso

  windows-iso-tests:
    name: Run ISO Build Tests - Windows (${{ matrix.arch }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ windows-latest ]
        dotnet-version: [ 10.0.x ]
        arch: [ x64, arm64 ]
        include:
          - arch: x64
            rid: linux-x64
          - arch: arm64
            rid: linux-arm64
    steps:
      - name: 🛠️ Enable long paths in Git
        run: git config --system core.longpaths true
        shell: pwsh

      - name: 📥 Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: 🛠️ Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ matrix.dotnet-version }}

      - name: 🧹 Clear NuGet cache before building packages
        run: dotnet nuget locals all --clear

      - name: 🔄 Compile Packages (multi-arch)
        shell: pwsh
        run: ./.devcontainer/postCreateCommand.ps1

      - name: 🔗 Install Assembler & Linking Tools
        uses: crazy-max/ghaction-chocolatey@v3.3.0
        with:
          args: install -y llvm yasm

      - name: 🔗 Install xorriso
        shell: pwsh
        run: |
          # Clone xorriso for Windows (includes required Cygwin DLLs)
          git clone https://github.com/PeyTy/xorriso-exe-for-windows.git --depth=1 C:\xorriso
          echo "C:\xorriso" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: 🔗 Install x64 GCC Toolchain
        if: matrix.arch == 'x64'
        shell: pwsh
        run: |
          curl -LO https://github.com/lordmilko/i686-elf-tools/releases/download/13.2.0/x86_64-elf-tools-windows.zip
          Expand-Archive x86_64-elf-tools-windows.zip -DestinationPath C:\x86_64-elf-tools
          echo "C:\x86_64-elf-tools\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: 🔗 Install ARM64 GCC Toolchain
        if: matrix.arch == 'arm64'
        shell: pwsh
        run: |
          curl -LO https://github.com/mmozeiko/build-gcc-arm/releases/download/gcc-v15.2.0/gcc-v15.2.0-aarch64-none-elf.7z
          7z x gcc-v15.2.0-aarch64-none-elf.7z -oC:\aarch64-elf-tools
          # Find the bin directory (archive may have a root folder)
          $binPath = Get-ChildItem -Path C:\aarch64-elf-tools -Recurse -Directory -Filter "bin" | Select-Object -First 1 -ExpandProperty FullName
          Write-Host "Adding to PATH: $binPath"
          echo $binPath | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          

      - name: 🔧 Install Patcher
        run: dotnet tool install -g Cosmos.Patcher --add-source ./artifacts/package/release

      - name: Build ISO for ${{ matrix.arch }}
        shell: pwsh
        run: |
          if ("${{ matrix.arch }}" -eq "arm64") {
            $ARCH_DEFINE = "ARCH_ARM64"
          } else {
            $ARCH_DEFINE = "ARCH_X64"
          }
          dotnet publish -c Debug -r ${{ matrix.rid }} -p:DefineConstants=$ARCH_DEFINE -p:CosmosArch=${{ matrix.arch }} --verbosity detailed ./examples/DevKernel/DevKernel.csproj -o ./output-${{ matrix.arch }}

      - name: 🕵️‍♂️ Verify Output
        shell: pwsh
        run: |
          if (Test-Path "./output-${{ matrix.arch }}/DevKernel.iso") {
              Write-Host "ISO exists for ${{ matrix.arch }}"
          } else {
              Write-Error "ISO missing for ${{ matrix.arch }}"
              exit 1
           }

      - name: 📤 Upload ISO
        uses: actions/upload-artifact@v4
        with:
          name: DevKernel-ISO-${{ github.job }}-${{ matrix.arch }}-${{ github.run_number }}
          path: ./output-${{ matrix.arch }}/DevKernel.iso

  macos-iso-tests:
    name: Run ISO Build Tests - macOS (${{ matrix.arch }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ macos-latest ]
        dotnet-version: [ 10.0.x ]
        arch: [ x64, arm64 ]
        include:
          - arch: x64
            rid: linux-x64
            gcc_package: x86_64-elf-gcc
            binutils_package: x86_64-elf-binutils
          - arch: arm64
            rid: linux-arm64
            gcc_package: aarch64-elf-gcc
            binutils_package: aarch64-elf-binutils
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: 🛠️ Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ matrix.dotnet-version }}

      - name: 🧹 Clear NuGet cache before building packages
        run: dotnet nuget locals all --clear

      - name: 🔄 Compile Packages (multi-arch)
        run: ./.devcontainer/postCreateCommand.sh

      - name: 🔗 Install Common Linking Tools
        run: brew install lld xorriso yasm

      - name: 🔗 Install Cross-Compilation Tools
        run: |
          # Install real GCC ELF cross-compilers (not Clang-based)
          # These support -mcmodel=kernel (x64) and -mcmodel=large (arm64) needed for bare-metal kernels
          brew install ${{ matrix.gcc_package }} ${{ matrix.binutils_package }}


      - name: 🔧 Install Patcher
        run: dotnet tool install -g Cosmos.Patcher --add-source ./artifacts/package/release

      - name: Build ISO for ${{ matrix.arch }}
        run: |
          if [ "${{ matrix.arch }}" = "arm64" ]; then
            ARCH_DEFINE="ARCH_ARM64"
          else
            ARCH_DEFINE="ARCH_X64"
          fi
          dotnet publish -c Debug -r ${{ matrix.rid }} -p:DefineConstants="$ARCH_DEFINE" -p:CosmosArch=${{ matrix.arch }} --verbosity detailed ./examples/DevKernel/DevKernel.csproj -o ./output-${{ matrix.arch }}

      - name: 🕵️‍♂️ Verify Output
        run: |
          [ -f ./output-${{ matrix.arch }}/DevKernel.iso ] && echo "ISO exists for ${{ matrix.arch }}" || (echo "ISO missing for ${{ matrix.arch }}" && exit 1)

      - name: 📤 Upload ISO
        uses: actions/upload-artifact@v4
        with:
          name: DevKernel-ISO-macOS-${{ matrix.arch }}-${{ github.run_number }}
          path: ./output-${{ matrix.arch }}/DevKernel.iso
