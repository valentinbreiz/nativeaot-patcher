name: Kernel Tests

on:
  push:
    branches: [ "main", "refactor/**", "feature/**", "fix/**" ]
    paths:
      - 'src/**'
      - 'tests/Cosmos.TestRunner.**'
      - 'tests/Kernels/**'
      - '.github/workflows/kernel-tests.yml'
      - '.github/workflows/kernel-test-run.yml'
      - '.github/workflows/kernel-test-results.yml'
  pull_request:
    types: [opened, synchronize, reopened, labeled]
    branches: [ "**" ]
    paths:
      - 'src/**'
      - 'tests/Cosmos.TestRunner.**'
      - 'tests/Kernels/**'
      - '.github/workflows/kernel-tests.yml'
      - '.github/workflows/kernel-test-run.yml'
      - '.github/workflows/kernel-test-results.yml'
  pull_request_target:
    branches: [ "**" ]
    paths:
      - 'src/**'
      - 'tests/Cosmos.TestRunner.**'
      - 'tests/Kernels/**'
      - '.github/workflows/kernel-tests.yml'
      - '.github/workflows/kernel-test-run.yml'
      - '.github/workflows/kernel-test-results.yml'
  workflow_dispatch:
    inputs:
      architecture:
        description: 'Architecture to test'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - x64
          - arm64
      coverage:
        description: 'Enable code coverage instrumentation'
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  checks: write
  issues: write
  pull-requests: write

jobs:
  # ── HelloWorld ────────────────────────────────────────────────────────────────
  helloworld-tests:
    uses: ./.github/workflows/kernel-test-run.yml
    with:
      suite_name: HelloWorld
      suite_id: helloworld
      kernel_path: tests/Kernels/Cosmos.Kernel.Tests.HelloWorld
      timeout_x64: 60
      timeout_arm64: 90
      step_timeout_minutes: 5
      coverage: ${{ inputs.coverage == true || (github.event.action == 'labeled' && github.event.label.name == 'run-coverage') }}

  helloworld-results:
    needs: helloworld-tests
    if: always()
    uses: ./.github/workflows/kernel-test-results.yml
    with:
      suite_name: HelloWorld
      suite_id: helloworld
      kernel_path: tests/Kernels/Cosmos.Kernel.Tests.HelloWorld
      event_name: ${{ github.event_name }}
      head_ref: ${{ github.head_ref || github.ref_name }}

  # ── Memory ────────────────────────────────────────────────────────────────────
  memory-tests:
    uses: ./.github/workflows/kernel-test-run.yml
    with:
      suite_name: Memory
      suite_id: memory
      kernel_path: tests/Kernels/Cosmos.Kernel.Tests.Memory
      timeout_x64: 120
      timeout_arm64: 180
      step_timeout_minutes: 10
      coverage: ${{ inputs.coverage == true || (github.event.action == 'labeled' && github.event.label.name == 'run-coverage') }}

  memory-results:
    needs: memory-tests
    if: always()
    uses: ./.github/workflows/kernel-test-results.yml
    with:
      suite_name: Memory
      suite_id: memory
      kernel_path: tests/Kernels/Cosmos.Kernel.Tests.Memory
      event_name: ${{ github.event_name }}
      head_ref: ${{ github.head_ref || github.ref_name }}

  # ── TypeCasting ───────────────────────────────────────────────────────────────
  typecasting-tests:
    uses: ./.github/workflows/kernel-test-run.yml
    with:
      suite_name: TypeCasting
      suite_id: typecasting
      kernel_path: tests/Kernels/Cosmos.Kernel.Tests.TypeCasting
      timeout_x64: 120
      timeout_arm64: 180
      step_timeout_minutes: 10
      coverage: ${{ inputs.coverage == true || (github.event.action == 'labeled' && github.event.label.name == 'run-coverage') }}

  typecasting-results:
    needs: typecasting-tests
    if: always()
    uses: ./.github/workflows/kernel-test-results.yml
    with:
      suite_name: TypeCasting
      suite_id: typecasting
      kernel_path: tests/Kernels/Cosmos.Kernel.Tests.TypeCasting
      event_name: ${{ github.event_name }}
      head_ref: ${{ github.head_ref || github.ref_name }}

  # ── Timer ─────────────────────────────────────────────────────────────────────
  timer-tests:
    uses: ./.github/workflows/kernel-test-run.yml
    with:
      suite_name: Timer
      suite_id: timer
      kernel_path: tests/Kernels/Cosmos.Kernel.Tests.Timer
      timeout_x64: 120
      timeout_arm64: 180
      step_timeout_minutes: 10
      coverage: ${{ inputs.coverage == true || (github.event.action == 'labeled' && github.event.label.name == 'run-coverage') }}

  timer-results:
    needs: timer-tests
    if: always()
    uses: ./.github/workflows/kernel-test-results.yml
    with:
      suite_name: Timer
      suite_id: timer
      kernel_path: tests/Kernels/Cosmos.Kernel.Tests.Timer
      event_name: ${{ github.event_name }}
      head_ref: ${{ github.head_ref || github.ref_name }}

  # ── Network ───────────────────────────────────────────────────────────────────
  network-tests:
    uses: ./.github/workflows/kernel-test-run.yml
    with:
      suite_name: Network
      suite_id: network
      kernel_path: tests/Kernels/Cosmos.Kernel.Tests.Network
      timeout_x64: 120
      timeout_arm64: 180
      step_timeout_minutes: 10
      coverage: ${{ inputs.coverage == true || (github.event.action == 'labeled' && github.event.label.name == 'run-coverage') }}

  network-results:
    needs: network-tests
    if: always()
    uses: ./.github/workflows/kernel-test-results.yml
    with:
      suite_name: Network
      suite_id: network
      kernel_path: tests/Kernels/Cosmos.Kernel.Tests.Network
      event_name: ${{ github.event_name }}
      head_ref: ${{ github.head_ref || github.ref_name }}

  # ── Threading ─────────────────────────────────────────────────────────────────
  threading-tests:
    uses: ./.github/workflows/kernel-test-run.yml
    with:
      suite_name: Threading
      suite_id: threading
      kernel_path: tests/Kernels/Cosmos.Kernel.Tests.Threading
      timeout_x64: 120
      timeout_arm64: 180
      step_timeout_minutes: 10
      coverage: ${{ inputs.coverage == true || (github.event.action == 'labeled' && github.event.label.name == 'run-coverage') }}

  threading-results:
    needs: threading-tests
    if: always()
    uses: ./.github/workflows/kernel-test-results.yml
    with:
      suite_name: Threading
      suite_id: threading
      kernel_path: tests/Kernels/Cosmos.Kernel.Tests.Threading
      event_name: ${{ github.event_name }}
      head_ref: ${{ github.head_ref || github.ref_name }}

  # ── Graphic ───────────────────────────────────────────────────────────────────
  graphic-tests:
    uses: ./.github/workflows/kernel-test-run.yml
    with:
      suite_name: Graphic
      suite_id: graphic
      kernel_path: tests/Kernels/Cosmos.Kernel.Tests.Graphic
      timeout_x64: 60
      timeout_arm64: 90
      step_timeout_minutes: 5
      coverage: ${{ inputs.coverage == true || (github.event.action == 'labeled' && github.event.label.name == 'run-coverage') }}

  graphic-results:
    needs: graphic-tests
    if: always()
    uses: ./.github/workflows/kernel-test-results.yml
    with:
      suite_name: Graphic
      suite_id: graphic
      kernel_path: tests/Kernels/Cosmos.Kernel.Tests.Graphic
      event_name: ${{ github.event_name }}
      head_ref: ${{ github.head_ref || github.ref_name }}

  # ── Coverage Report ──────────────────────────────────────────────────────────
  coverage-report:
    name: Coverage Report
    runs-on: ubuntu-latest
    needs: [ helloworld-tests, memory-tests, typecasting-tests, timer-tests, network-tests, threading-tests, graphic-tests ]
    if: always() && (inputs.coverage == true || (github.event.action == 'labeled' && github.event.label.name == 'run-coverage'))
    permissions:
      pull-requests: write
    steps:
      - name: 📥 Download Coverage Artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: coverage-*
          path: ./coverage
          merge-multiple: false

      - name: 📊 Generate Coverage Summary
        id: coverage
        run: |
          echo "# 📊 Code Coverage Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Merge all coverage JSON files
          total_methods=0
          total_hit=0
          found_any=false

          for json_file in $(find ./coverage -name "coverage-*.json" 2>/dev/null); do
            found_any=true
            suite=$(python3 -c "import json; d=json.load(open('$json_file')); print(d.get('suite',''))" 2>/dev/null || echo "unknown")
            arch=$(python3 -c "import json; d=json.load(open('$json_file')); print(d.get('architecture',''))" 2>/dev/null || echo "unknown")
            methods=$(python3 -c "import json; d=json.load(open('$json_file')); print(d.get('totalMethods',0))" 2>/dev/null || echo "0")
            hit=$(python3 -c "import json; d=json.load(open('$json_file')); print(d.get('hitMethods',0))" 2>/dev/null || echo "0")
            pct=$(python3 -c "import json; d=json.load(open('$json_file')); print(f\"{d.get('percentage',0):.1f}\")" 2>/dev/null || echo "0.0")

            echo "| $suite ($arch) | $hit/$methods | $pct% |" >> /tmp/coverage_rows.txt

            # Track unique hits across all suites via coverage map
            if [ "$methods" -gt "$total_methods" ]; then
              total_methods=$methods
            fi
          done

          if [ "$found_any" = true ]; then
            echo "| Suite | Methods Hit | Coverage |" >> $GITHUB_STEP_SUMMARY
            echo "|-------|-------------|----------|" >> $GITHUB_STEP_SUMMARY
            cat /tmp/coverage_rows.txt >> $GITHUB_STEP_SUMMARY 2>/dev/null
            echo "" >> $GITHUB_STEP_SUMMARY

            # Write complete PR comment body
            {
              echo "# 📊 Code Coverage Report"
              echo ""
              echo "| Suite | Methods Hit | Coverage |"
              echo "|-------|-------------|----------|"
              cat /tmp/coverage_rows.txt
              echo ""
              echo "📋 [View full report](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})"
            } > /tmp/coverage_pr_comment.md
          else
            echo "No coverage data found. Coverage instrumentation may not be enabled." >> $GITHUB_STEP_SUMMARY
          fi

      - name: 💬 Add Coverage PR Comment
        if: (github.event_name == 'pull_request' || github.event_name == 'pull_request_target') && steps.coverage.outcome == 'success'
        uses: marocchino/sticky-pull-request-comment@v2
        continue-on-error: true
        with:
          header: code-coverage
          path: /tmp/coverage_pr_comment.md

  # ── Summary ───────────────────────────────────────────────────────────────────
  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [ helloworld-tests, memory-tests, typecasting-tests, timer-tests, network-tests, threading-tests, graphic-tests ]
    if: always()
    steps:
      - name: 📊 Generate Summary
        run: |
          echo "# 🧪 Kernel Test Suite Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Test Suite | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------------|--------|" >> $GITHUB_STEP_SUMMARY

          add_row() {
            local name=$1
            local result=$2
            if [ "$result" = "success" ]; then
              echo "| $name | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
            else
              echo "| $name | ❌ Failed |" >> $GITHUB_STEP_SUMMARY
            fi
          }

          add_row "HelloWorld"  "${{ needs.helloworld-tests.result }}"
          add_row "Memory"      "${{ needs.memory-tests.result }}"
          add_row "TypeCasting" "${{ needs.typecasting-tests.result }}"
          add_row "Timer"       "${{ needs.timer-tests.result }}"
          add_row "Network"     "${{ needs.network-tests.result }}"
          add_row "Threading"   "${{ needs.threading-tests.result }}"
          add_row "Graphic"     "${{ needs.graphic-tests.result }}"

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Run ID:** ${{ github.run_id }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
