name: Kernel Coverage

on:
  pull_request:
    types: [labeled]

permissions:
  contents: read
  checks: write
  issues: write
  pull-requests: write

jobs:
  # ── HelloWorld ────────────────────────────────────────────────────────────────
  helloworld-tests:
    if: github.event.label.name == 'run-coverage'
    uses: ./.github/workflows/kernel-test-run.yml
    with:
      suite_name: HelloWorld
      suite_id: helloworld
      kernel_path: tests/Kernels/Cosmos.Kernel.Tests.HelloWorld
      timeout_x64: 60
      timeout_arm64: 90
      step_timeout_minutes: 5
      coverage: true

  # ── Memory ────────────────────────────────────────────────────────────────────
  memory-tests:
    if: github.event.label.name == 'run-coverage'
    uses: ./.github/workflows/kernel-test-run.yml
    with:
      suite_name: Memory
      suite_id: memory
      kernel_path: tests/Kernels/Cosmos.Kernel.Tests.Memory
      timeout_x64: 120
      timeout_arm64: 180
      step_timeout_minutes: 10
      coverage: true

  # ── TypeCasting ───────────────────────────────────────────────────────────────
  typecasting-tests:
    if: github.event.label.name == 'run-coverage'
    uses: ./.github/workflows/kernel-test-run.yml
    with:
      suite_name: TypeCasting
      suite_id: typecasting
      kernel_path: tests/Kernels/Cosmos.Kernel.Tests.TypeCasting
      timeout_x64: 120
      timeout_arm64: 180
      step_timeout_minutes: 10
      coverage: true

  # ── Timer ─────────────────────────────────────────────────────────────────────
  timer-tests:
    if: github.event.label.name == 'run-coverage'
    uses: ./.github/workflows/kernel-test-run.yml
    with:
      suite_name: Timer
      suite_id: timer
      kernel_path: tests/Kernels/Cosmos.Kernel.Tests.Timer
      timeout_x64: 120
      timeout_arm64: 180
      step_timeout_minutes: 10
      coverage: true

  # ── Network ───────────────────────────────────────────────────────────────────
  network-tests:
    if: github.event.label.name == 'run-coverage'
    uses: ./.github/workflows/kernel-test-run.yml
    with:
      suite_name: Network
      suite_id: network
      kernel_path: tests/Kernels/Cosmos.Kernel.Tests.Network
      timeout_x64: 120
      timeout_arm64: 180
      step_timeout_minutes: 10
      coverage: true

  # ── Threading ─────────────────────────────────────────────────────────────────
  threading-tests:
    if: github.event.label.name == 'run-coverage'
    uses: ./.github/workflows/kernel-test-run.yml
    with:
      suite_name: Threading
      suite_id: threading
      kernel_path: tests/Kernels/Cosmos.Kernel.Tests.Threading
      timeout_x64: 120
      timeout_arm64: 180
      step_timeout_minutes: 10
      coverage: true

  # ── Graphic ───────────────────────────────────────────────────────────────────
  graphic-tests:
    if: github.event.label.name == 'run-coverage'
    uses: ./.github/workflows/kernel-test-run.yml
    with:
      suite_name: Graphic
      suite_id: graphic
      kernel_path: tests/Kernels/Cosmos.Kernel.Tests.Graphic
      timeout_x64: 60
      timeout_arm64: 90
      step_timeout_minutes: 5
      coverage: true

  # ── Coverage Report ──────────────────────────────────────────────────────────
  coverage-report:
    name: Coverage Report
    runs-on: ubuntu-latest
    needs: [helloworld-tests, memory-tests, typecasting-tests, timer-tests, network-tests, threading-tests, graphic-tests]
    if: always() && github.event.label.name == 'run-coverage'
    permissions:
      pull-requests: write
    steps:
      - name: 📥 Download Coverage Artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: coverage-*
          path: ./coverage
          merge-multiple: false

      - name: 📊 Generate Coverage Summary
        id: coverage
        run: |
          echo "# 📊 Code Coverage Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          total_methods=0
          total_hit=0
          found_any=false

          for json_file in $(find ./coverage -name "coverage-*.json" 2>/dev/null); do
            found_any=true
            suite=$(python3 -c "import json; d=json.load(open('$json_file')); print(d.get('suite',''))" 2>/dev/null || echo "unknown")
            arch=$(python3 -c "import json; d=json.load(open('$json_file')); print(d.get('architecture',''))" 2>/dev/null || echo "unknown")
            methods=$(python3 -c "import json; d=json.load(open('$json_file')); print(d.get('totalMethods',0))" 2>/dev/null || echo "0")
            hit=$(python3 -c "import json; d=json.load(open('$json_file')); print(d.get('hitMethods',0))" 2>/dev/null || echo "0")
            pct=$(python3 -c "import json; d=json.load(open('$json_file')); print(f\"{d.get('percentage',0):.1f}\")" 2>/dev/null || echo "0.0")

            echo "| $suite ($arch) | $hit/$methods | $pct% |" >> /tmp/coverage_rows.txt

            if [ "$methods" -gt "$total_methods" ]; then
              total_methods=$methods
            fi
          done

          if [ "$found_any" = true ]; then
            echo "| Suite | Methods Hit | Coverage |" >> $GITHUB_STEP_SUMMARY
            echo "|-------|-------------|----------|" >> $GITHUB_STEP_SUMMARY
            cat /tmp/coverage_rows.txt >> $GITHUB_STEP_SUMMARY 2>/dev/null
            echo "" >> $GITHUB_STEP_SUMMARY

            {
              echo "# 📊 Code Coverage Report"
              echo ""
              echo "| Suite | Methods Hit | Coverage |"
              echo "|-------|-------------|----------|"
              cat /tmp/coverage_rows.txt
              echo ""
              echo "📋 [View full report](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})"
            } > /tmp/coverage_pr_comment.md
          else
            echo "No coverage data found. Coverage instrumentation may not be enabled." >> $GITHUB_STEP_SUMMARY
          fi

      - name: 💬 Add Coverage PR Comment
        if: steps.coverage.outcome == 'success'
        uses: marocchino/sticky-pull-request-comment@v2
        continue-on-error: true
        with:
          header: code-coverage
          path: /tmp/coverage_pr_comment.md
